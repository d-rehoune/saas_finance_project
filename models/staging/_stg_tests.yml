version: 2

models:
  - name: stg_customers
    columns:
      - name: customer_id
        tests:
          - unique
          - not_null
      - name: country
        tests:
          - not_null
          - accepted_values:
              values: ['France', 'Belgique', 'Suisse', 'Luxembourg']

  - name: stg_subscriptions
    columns:
      - name: subscription_id
        tests:
          - unique
          - not_null
      - name: customer_id
        tests:
          - not_null
          - relationships:
              to: ref('stg_customers')
              field: customer_id
      - name: plan_name
        tests:
          - accepted_values:
              values: ['Essential', 'Business', 'Custom']
      - name: status
        tests:
          - accepted_values:
              values: ['active', 'cancelled']

  - name: stg_transactions
    columns:
      - name: transaction_id
        tests:
          - unique
          - not_null
      - name: customer_id
        tests:
          - not_null
          - relationships:
              to: ref('stg_customers')
              field: customer_id
      - name: status
        tests:
          - accepted_values:
              values: ['success', 'failed', 'chargeback']
      - name: amount
        tests:
          - not_null